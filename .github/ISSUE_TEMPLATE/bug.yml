name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG]: "
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Use this template for bugs and unexpected behavior.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: "When I try to..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python main.py`
        2. Type "..."
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output
      render: shell
    validations:
      required: false
