name: Feature Request
description: Request a new feature or enhancement
title: "[FEAT]: "
labels: ["type/feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Use this template for new features or significant enhancements.

  - type: input
    id: issue_id
    attributes:
      label: Issue ID
      description: The tracking ID from the gap analysis (e.g., AGT-P-001)
      placeholder: "AGT-P-001"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the feature
      placeholder: "Implement pure LLM intent classification..."
    validations:
      required: true

  - type: textarea
    id: spec_reference
    attributes:
      label: Spec Reference
      description: Link to relevant specification section
      placeholder: "specs/MAINAGENT.md Section 2.1"
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this feature to be complete?
      placeholder: |
        - [ ] Orchestrator uses tool_use for intent classification
        - [ ] No keyword lists in config
        - [ ] Tests pass
    validations:
      required: true

  - type: dropdown
    id: ai_first
    attributes:
      label: AI-First Requirement
      description: Must this feature use pure LLM intelligence?
      options:
        - "No - Standard implementation"
        - "Yes - No keywords/regex allowed"
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any blocking issues
      placeholder: "Blocked by #123"
    validations:
      required: false
