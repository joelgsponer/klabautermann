# Klabautermann Docker Compose Configuration
# Multi-agent PKM system with temporal knowledge graph
#
# Usage:
#   docker-compose up -d          # Start services
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop services
#   docker-compose down -v        # Stop and remove volumes (data loss!)

services:
  # ===========================================================================
  # Neo4j Graph Database
  # ===========================================================================
  neo4j:
    image: neo4j:5.26-community
    container_name: klabautermann-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-klabautermann}
      # Memory configuration for development
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
      # Enable APOC plugin
      - NEO4J_PLUGINS=["apoc"]
      # Allow APOC procedures
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - klabautermann-net

  # ===========================================================================
  # Klabautermann Application
  # ===========================================================================
  klabautermann-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klabautermann-app
    restart: unless-stopped
    stdin_open: true   # Keep stdin open for CLI interaction
    tty: true          # Allocate pseudo-TTY
    env_file:
      - .env
    environment:
      # Override for container networking
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      # Development: mount source for hot reload
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./config:/app/config:ro
      # Persistent data and logs
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - klabautermann-net

# ===========================================================================
# Networks
# ===========================================================================
networks:
  klabautermann-net:
    name: klabautermann-network
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  neo4j_data:
    name: klabautermann-neo4j-data
  neo4j_logs:
    name: klabautermann-neo4j-logs
  neo4j_plugins:
    name: klabautermann-neo4j-plugins
