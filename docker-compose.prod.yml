# Klabautermann Production Docker Compose Configuration
#
# Optimized for production deployments with:
# - Resource limits
# - Restart policies
# - Security hardening
# - No source mounts
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f

services:
  # ===========================================================================
  # Neo4j Graph Database (Production)
  # ===========================================================================
  neo4j:
    image: neo4j:5.26-community
    container_name: klabautermann-neo4j-prod
    restart: always
    ports:
      - "7474:7474"  # Browser (consider removing in production)
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      # Production memory settings
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_initial__size=2G
      - NEO4J_server_memory_heap_max__size=4G
      # Enable APOC plugin
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      # Security hardening
      - NEO4J_dbms_connector_bolt_listen__address=:7687
      - NEO4J_dbms_connector_http_listen__address=:7474
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - ./backups:/backups  # For backup scripts
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 6G
        reservations:
          cpus: "1.0"
          memory: 4G
    networks:
      - klabautermann-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ===========================================================================
  # Klabautermann Application (Production)
  # ===========================================================================
  klabautermann-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: klabautermann-app-prod
    restart: always
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - LOG_LEVEL=INFO
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      # Only persist data and logs (no source mounts in production)
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    networks:
      - klabautermann-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ===========================================================================
# Networks
# ===========================================================================
networks:
  klabautermann-net:
    name: klabautermann-network-prod
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  neo4j_data:
    name: klabautermann-neo4j-data-prod
  neo4j_logs:
    name: klabautermann-neo4j-logs-prod
  neo4j_plugins:
    name: klabautermann-neo4j-plugins-prod
  app_data:
    name: klabautermann-app-data-prod
  app_logs:
    name: klabautermann-app-logs-prod
