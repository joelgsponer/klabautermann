{% extends "base.html" %}

{% block title %}Register — Klabautermann{% endblock %}

{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Klabautermann</h1>
        <p class="auth-subtitle">Join the Crew</p>

        {% if let Some(msg) = error %}
        <div class="error-message">{{ msg }}</div>
        {% endif %}

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       placeholder="Your name, sailor">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="At least 8 characters">
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required
                       placeholder="Say it again">
            </div>
            <button type="submit" class="btn btn-primary">Set Sail</button>
        </form>

        <p class="auth-link">
            Already aboard? <a href="/login">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
