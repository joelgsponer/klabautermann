<div id="daily-summary" class="summary-panel">
    {% if let Some(s) = summary %}
    <div class="summary-header">
        <h3 class="summary-title">Today's Summary</h3>
        {% if has_gemini_key %}
        <button class="btn btn-ghost"
                hx-post="/summary/generate"
                hx-target="#daily-summary"
                hx-swap="outerHTML"
                hx-indicator="#summary-loading">
            Regenerate
        </button>
        {% endif %}
    </div>
    <div class="summary-text">{{ s.summary }}</div>
    {% else %}
    <div class="summary-header">
        <h3 class="summary-title">Daily Summary</h3>
    </div>
    {% if has_gemini_key %}
    <p class="summary-empty">No summary yet for today.</p>
    <button class="btn btn-primary btn-sm"
            hx-post="/summary/generate"
            hx-target="#daily-summary"
            hx-swap="outerHTML"
            hx-indicator="#summary-loading">
        Generate Summary
    </button>
    {% else %}
    <p class="summary-empty">Set GEMINI_API_KEY to enable AI-powered daily summaries.</p>
    {% endif %}
    {% endif %}
    <div id="summary-loading" class="htmx-indicator summary-loading">Generating summary...</div>
</div>
