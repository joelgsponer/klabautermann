<form id="entry-form"
      hx-post="/entries"
      hx-target="#timeline"
      hx-swap="afterbegin"
      hx-encoding="multipart/form-data"
      hx-on::after-request="this.reset(); document.getElementById('content').focus();"
      class="entry-form">
    <div class="form-row" style="position: relative;">
        <textarea id="content" name="content"
                  placeholder="What's on your mind, sailor?"
                  rows="1"
                  class="entry-input"
                  onInput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"
                  onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); this.closest('form').requestSubmit();}"></textarea>
        <div id="tag-autocomplete" class="tag-autocomplete" hidden></div>
    </div>
    <div class="form-actions">
        <input type="file" id="media-file" name="media" accept="audio/*,video/*,image/*" hidden>
        <input type="file" id="camera-photo" accept="image/*" capture="environment" hidden>
        <input type="file" id="camera-video" accept="video/*" capture="environment" hidden>
        <div class="media-buttons">
            <button type="button" id="btn-audio" class="btn btn-icon" title="Record audio"
                    onclick="toggleAudioRecording()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button type="button" id="btn-camera" class="btn btn-icon" title="Take photo/video"
                    onclick="openCameraMenu()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <button type="button" id="btn-image" class="btn btn-icon" title="Attach image"
                    onclick="document.getElementById('media-file').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
        </div>
        <div id="recording-status" class="recording-status" hidden>
            <span class="recording-dot"></span>
            <span id="recording-timer">0:00</span>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Log Entry</button>
    </div>
    <div id="media-preview" class="media-preview" hidden></div>
</form>
