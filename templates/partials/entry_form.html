<form id="entry-form"
      hx-post="/entries"
      hx-target="#timeline"
      hx-swap="afterbegin"
      hx-encoding="multipart/form-data"
      hx-on::after-request="this.reset(); document.getElementById('content').focus();"
      class="entry-form">
    <div class="form-row">
        <textarea id="content" name="content"
                  placeholder="What's on your mind, sailor?"
                  rows="1"
                  class="entry-input"
                  onInput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"
                  onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); this.closest('form').requestSubmit();}"></textarea>
    </div>
    <div class="form-actions">
        <input type="file" id="media-file" name="media" accept="audio/*,video/*" hidden>
        <div class="media-buttons">
            <button type="button" id="btn-audio" class="btn btn-icon" title="Record audio"
                    onclick="toggleAudioRecording()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button type="button" id="btn-video" class="btn btn-icon" title="Record video"
                    onclick="toggleVideoRecording()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
        </div>
        <div id="recording-status" class="recording-status" hidden>
            <span class="recording-dot"></span>
            <span id="recording-timer">0:00</span>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Log Entry</button>
    </div>
    <div id="media-preview" class="media-preview" hidden></div>
</form>
