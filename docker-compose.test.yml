# Test-specific Docker Compose for Klabautermann
# Uses different ports to avoid conflicts with development
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   pytest tests/ -v -m "requires_neo4j"
#   docker-compose -f docker-compose.test.yml down -v

services:
  neo4j-test:
    image: neo4j:5.26-community
    container_name: klabautermann-neo4j-test
    ports:
      - "7475:7474"  # Browser (test port)
      - "7688:7687"  # Bolt protocol (test port)
    environment:
      - NEO4J_AUTH=neo4j/testpassword
      - NEO4J_server_memory_pagecache_size=256M
      - NEO4J_server_memory_heap_initial__size=256M
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - klabautermann-test-net

networks:
  klabautermann-test-net:
    name: klabautermann-test-network
    driver: bridge

volumes:
  neo4j_test_data:
    name: klabautermann-neo4j-test-data
