# Klabautermann Pre-Commit Configuration
# =========================================
# Enforces code quality standards before commits
#
# Installation:
#   make dev  (or: pre-commit install)
#
# Manual run:
#   pre-commit run --all-files
#
# Update hooks:
#   pre-commit autoupdate

repos:
  # ===========================================================================
  # Pre-commit built-in hooks
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        name: Remove trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        name: Ensure files end with newline
      - id: check-yaml
        name: Validate YAML files
      - id: check-toml
        name: Validate TOML files
      - id: check-json
        name: Validate JSON files
      - id: check-added-large-files
        name: Prevent large files (>500KB)
        args: [--maxkb=500]
      - id: detect-private-key
        name: Detect private keys
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: check-case-conflict
        name: Check for case-insensitive filename conflicts
      - id: mixed-line-ending
        name: Check for mixed line endings
        args: [--fix=lf]

  # ===========================================================================
  # Ruff - Linting and Formatting
  # ===========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      # Run the linter
      - id: ruff
        name: Ruff linter
        args: [--fix]
        types_or: [python, pyi]
      # Run the formatter
      - id: ruff-format
        name: Ruff formatter
        types_or: [python, pyi]

  # ===========================================================================
  # Mypy - Type Checking
  # ===========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: Type check with mypy
        additional_dependencies:
          - pydantic>=2.0
          - types-pyyaml
        args:
          - --config-file=pyproject.toml
        files: ^src/
        exclude: ^tests/

  # ===========================================================================
  # Python-specific checks
  # ===========================================================================
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        name: Require specific noqa codes
      - id: python-check-blanket-type-ignore
        name: Require specific type ignore codes
      - id: python-no-eval
        name: Prevent use of eval()
      - id: python-use-type-annotations
        name: Enforce type annotations over comments
