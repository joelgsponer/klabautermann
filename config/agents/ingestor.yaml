# Ingestor Configuration
# Extracts entities and relationships from conversations

model:
  primary: claude-3-haiku-20240307
  temperature: 0.3
  max_context_tokens: 4000
  max_output_tokens: 1024

extraction:
  entity_types:
    - Person
    - Organization
    - Project
    - Goal
    - Task
    - Event
    - Location
  relationship_types:
    - WORKS_AT
    - PART_OF
    - CONTRIBUTES_TO
    - ATTENDED
    - HELD_AT
    - BLOCKS
    - MENTIONED_IN
    - KNOWS
    - ASSIGNED_TO
  confidence_threshold: 0.7

timeouts:
  agent_response: 30.0
  llm_call: 30.0

retry:
  max_attempts: 2
  base_delay: 1.0
  max_delay: 10.0
