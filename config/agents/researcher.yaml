# Researcher Configuration
# Searches the knowledge graph for relevant information

model:
  primary: claude-3-haiku-20240307
  temperature: 0.3
  max_context_tokens: 4000
  max_output_tokens: 2048

search:
  max_results: 10
  min_score: 0.5
  use_vector_search: true
  use_graph_traversal: true
  max_hops: 2

timeouts:
  agent_response: 30.0
  llm_call: 30.0

retry:
  max_attempts: 3
  base_delay: 1.0
  max_delay: 15.0
