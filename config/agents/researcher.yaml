# Researcher Configuration
# Searches the knowledge graph for relevant information

model:
  # Planning uses Sonnet for speed - just picking search strategies
  planning: claude-sonnet-4-20250514
  # Synthesis uses Opus for quality reasoning
  synthesis: claude-opus-4-5-20251101
  temperature: 0.3
  max_context_tokens: 4000
  max_output_tokens: 2048

search:
  max_results: 10
  min_score: 0.5
  use_vector_search: true
  use_graph_traversal: true
  max_hops: 2
  max_parallel_strategies: 4
  default_result_limit: 10
  max_total_results: 50
  timeout_seconds: 30
  # Web search via Brave Search API
  web_search_enabled: true
  web_search_timeout: 10.0
  web_result_limit: 5

# Timeouts - these keys must match what researcher.py reads
timeouts:
  planning: 30.0      # Was 15s default - Sonnet should be faster anyway
  execution: 45.0     # Search execution timeout
  synthesis: 60.0     # Opus synthesis needs more time

retry:
  max_attempts: 3
  base_delay: 1.0
  max_delay: 15.0
