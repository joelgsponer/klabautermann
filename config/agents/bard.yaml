# Bard of the Bilge configuration
# The keeper of mythology and SOLE OWNER of personality/voice
# The Bard transforms clean functional responses into nautical-voiced output

name: bard

# LLM Personality Rewriting (Bard uses Haiku for voice transformation)
personality:
  enabled: true
  model: claude-3-5-haiku-20241022
  temperature: 0.8
  max_tokens: 1024

# Probability that a response gets "salted" with a tidbit (5-10%)
tidbit_probability: 0.07

# Probability of continuing existing saga vs starting new one
saga_continuation_probability: 0.3

# Saga lifecycle rules
saga_rules:
  max_chapters: 5
  max_active: 3
  timeout_days: 30
  min_interval_hours: 1.0

# Selection weights for tidbit types
selection_weights:
  continue_saga: 0.3
  start_saga: 0.2
  standalone: 0.5

# Storm mode - skip personality and tidbits during urgent responses
# Bard detects storm keywords and returns terse, direct responses
storm_mode:
  enabled: true
  keywords:
    - urgent
    - emergency
    - critical
    - asap
    - immediately
    - crisis

# Channel-specific formatting
channels:
  cli:
    # CLI gets plain text output
    format: plain
  telegram:
    # Telegram supports Markdown
    format: markdown
  api:
    # API gets clean text, no formatting
    format: raw

# Display formatting for tidbits
display:
  format: italic  # Wrap tidbits in _underscores_ for markdown italic
  separator: "\n\n"  # Separator between response and tidbit
