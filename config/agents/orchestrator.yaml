# Orchestrator Configuration
# The "CEO" agent that routes intents and coordinates sub-agents

# V2 Workflow: Think-Dispatch-Synthesize pattern (Sprint 4)
# When true, uses parallel multi-intent processing instead of single-intent routing
use_v2_workflow: true

model:
  primary: claude-sonnet-4-20250514
  fallback: claude-3-haiku-20240307
  temperature: 0.7
  max_context_tokens: 8000
  max_output_tokens: 4096

personality:
  name: klabautermann
  wit_level: 0.3  # 0.0 = terse, 1.0 = very witty

# Intent classification uses LLM (Haiku) for semantic understanding
# No hardcoded keyword lists - the LLM handles classification
intent_classification:
  model: claude-3-5-haiku-20241022  # Fast model for classification
  timeout: 5.0  # Seconds before fallback to heuristics

delegation:
  search: researcher
  action: executor
  ingest: ingestor

timeouts:
  agent_response: 30.0
  llm_call: 60.0
  mcp_call: 30.0

retry:
  max_attempts: 3
  base_delay: 1.0
  max_delay: 30.0
  jitter: 0.25
