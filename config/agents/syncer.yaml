# Syncer Agent Configuration
#
# The Syncer imports emails and calendar events from Google Workspace
# into the knowledge graph for persistent memory of communications.
#
# Reference: specs/architecture/AGENTS.md

name: syncer
model:
  primary: claude-3-5-haiku-20241022  # For any LLM formatting needs

# Calendar sync settings
calendar:
  enabled: true
  lookback_days: 7        # How far back to sync on first run
  lookahead_days: 14      # How far ahead to sync

# Email sync settings
# Only archived emails are ingested into the knowledge graph.
# Archive = "worth remembering", Delete = "discard"
# This uses user intent as the filter - no need for blocklists.
email:
  enabled: true
  lookback_hours: 168     # 7 days - archived emails may be older
  max_per_sync: 50        # Max emails per sync cycle
  query: "-in:inbox -in:trash -in:spam"  # Archived emails only
