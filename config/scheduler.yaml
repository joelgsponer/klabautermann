# Scheduler Configuration for Klabautermann
#
# Controls periodic job execution for agents that run on schedules.
#
# Reference: T047 - APScheduler Integration

# Archivist Configuration
# Scans for inactive threads and archives them to reduce graph clutter
archivist:
  enabled: true
  interval_minutes: 15  # Scan every 15 minutes

# Scribe Configuration
# Generates daily journal reflections from the day's activities
scribe:
  enabled: true
  hour: 0     # Midnight UTC
  minute: 0

# Syncer Configuration
# Imports emails and calendar events from Google Workspace
syncer:
  enabled: true
  interval_minutes: 15  # Sync every 15 minutes

# Purser Configuration
# Synchronizes Gmail and Calendar via delta-sync (#55)
purser:
  enabled: true
  interval_minutes: 15  # Sync every 15 minutes

# Cartographer Configuration
# Detects knowledge graph communities (Knowledge Islands)
cartographer:
  enabled: true
  cron: "0 0 * * 0"  # Sunday midnight

# Scheduler Settings
timezone: UTC  # All jobs run in UTC
job_store: memory  # Options: 'memory' or 'sqlite'

# SQLite job store path (if job_store: sqlite)
# This enables job persistence across restarts
# sqlite_path: data/jobs.sqlite
